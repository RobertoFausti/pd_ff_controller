pd_ff_controller:
  joint_names:
    type: string_array
    default_value: []
    read_only: true
    description: "Joints to control."
    validation:
      not_empty<>: []
      unique<>: null
  command_interface:
    type: string
    default_value: "effort"
    read_only: true
    description: "Hardware command interface type written to each joint."
    validation:
      not_empty<>: null

  state_interfaces:
    type: string_array
    default_value: ["position", "velocity"]
    read_only: true
    description: >
      Hardware state interface types to read, in order:
      index 0 → P-term state, index 1 → D-term state.
    validation:
      not_empty<>: []
      size_gt<>: 0
      size_lt<>: 3

  reference_interfaces:
    type: string_array
    default_value: ["position", "velocity", "effort", "gait_state"]
    read_only: true
    description: >
      Reference interface types exported for chaining, in order. Recognized
      names: position (block 0, always), velocity (block 1, always),
      effort (feedforward torque, no state pair — resolved by name),
      gait_state (per-joint stance/swing signal used to select stance vs
      swing gains, no state pair — resolved by name).
    validation:
      not_empty<>: []
      size_gt<>: 0
      size_lt<>: 5
      unique<>: null

  leg_names:
    type: string_array
    default_value: []
    read_only: true
    description: "Names of the legs to group joints by (e.g. FL, FR, RL, RR)."
    validation:
      unique<>: null

  legs:
    __map_leg_names:
      leg_number:
        type: int
        default_value: 0
        description: >
          Index of this leg within the per-leg gait_state array of the
          incoming reference message (JointCmd.gait_state[leg_number]).
        validation:
          gt_eq<>: [0]
      joint_names:
        type: string_array
        default_value: []
        description: "Joint names belonging to this leg (subset of the top-level joint_names list)."
        validation:
          not_empty<>: []

  gains:
    __map_joint_names:
      stance:
        p:
          type: double
          default_value: 0.0
          description: "Stance-phase position error proportional gain."
        d:
          type: double
          default_value: 0.0
          description: "Stance-phase velocity error derivative gain."
        i:
          type: double
          default_value: 0.0
          description: "Stance-phase position error integral gain."
        i_max:
          type: double
          default_value: 0.0
          description: "Stance-phase upper clamp for the integral contribution (back_calculation anti-windup)."
          validation:
            gt_eq<>: [0.0]
        i_min:
          type: double
          default_value: 0.0
          description: "Stance-phase lower clamp for the integral contribution (back_calculation anti-windup)."
          validation:
            lt_eq<>: [0.0]
      swing:
        p:
          type: double
          default_value: 0.0
          description: "Swing-phase position error proportional gain."
        d:
          type: double
          default_value: 0.0
          description: "Swing-phase velocity error derivative gain."
        i:
          type: double
          default_value: 0.0
          description: "Swing-phase position error integral gain."
        i_max:
          type: double
          default_value: 0.0
          description: "Swing-phase upper clamp for the integral contribution (back_calculation anti-windup)."
          validation:
            gt_eq<>: [0.0]
        i_min:
          type: double
          default_value: 0.0
          description: "Swing-phase lower clamp for the integral contribution (back_calculation anti-windup)."
          validation:
            lt_eq<>: [0.0]
